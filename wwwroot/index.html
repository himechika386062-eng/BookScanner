<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarcodeAlertApp</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BarcodeAlertApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        window.beepSound = new Audio('beep.mp3');
        
        let isScanningLocked = false;

        window.startCamera = (dotNetHelper) => {
            if (typeof Html5Qrcode === 'undefined') {
                console.warn("Html5Qrcode is not loaded yet. Retrying in 100ms...");
                setTimeout(() => window.startCamera(dotNetHelper), 100);
                return;
            }

            window.beepSound.play()
                .then(() => console.log("Audio unlocked!"))
                .catch(err => console.log("Audio play blocked: ", err));

            const html5Qrcode = new Html5Qrcode("reader");
            html5Qrcode.start(
                { facingMode: "environment" }, 
                { 
                    fps: 10, 
                    qrbox: (viewfinderWidth, viewfinderHeight) => {
                        return { width: 280, height: 80 };
                    }
                },
                (text) => {
                    if (isScanningLocked) return;
                    isScanningLocked = true;

                    window.beepSound.play();
                    dotNetHelper.invokeMethodAsync('OnScan', text);

                    setTimeout(() => {
                        isScanningLocked = false;
                    }, 2000); 
                },
                (err) => { /* エラー無視 */ }
            ).catch(err => {
                alert("カメラの起動に失敗しました: " + err);
            });
        };
    </script>
    <script>
        // GASにデータをフォーム形式で送りつける関数
        function sendToGoogleSheets(url, dataObject) {
            const params = new URLSearchParams();
            params.append("isbn", dataObject.isbn || "");
            params.append("title", dataObject.title || "");
            params.append("author", dataObject.author || "");
            params.append("publisher", dataObject.publisher || "");
            params.append("pubDate", dataObject.pubDate || "");

            return fetch(url, {
                method: "POST",
                mode: "no-cors", 
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: params.toString()
            }).then(response => {
                return true; 
            }).catch(error => {
                console.error("Fetch error:", error);
                return false;
            });
        }
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
