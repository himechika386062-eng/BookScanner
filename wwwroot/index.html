<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarcodeAlertApp</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BarcodeAlertApp.styles.css" rel="stylesheet" />
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        let tokenClient;
        let accessToken = null;

        // 🟢 ログイン状態がブラウザに残っているか確認する関数
        window.checkExistingAuth = function () {
            const savedToken = localStorage.getItem("google_access_token");
            const expiry = localStorage.getItem("google_token_expiry");
            
            if (savedToken && expiry && Date.now() < parseInt(expiry)) {
                accessToken = savedToken;
                console.log("既にある有効なトークンを復元しました");
                return true; 
            }
            localStorage.removeItem("google_access_token");
            localStorage.removeItem("google_token_expiry");
            return false;
        };

        // 🟢 一時的に保存されたトークンを取り出す関数
        window.getSavedToken = function () {
            return accessToken || "";
        };

        // 🔄 ログイン処理（トークンの自動保存に対応）
        window.requestGoogleLogin = function (dotNetHelper, clientId) {
            if (window.checkExistingAuth()) {
                dotNetHelper.invokeMethodAsync("OnGoogleAuthSuccess", accessToken);
                return;
            }

            if (!tokenClient) {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: clientId,
                    scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file',
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            
                            // 1時間有効なトークンをLocalStorageに保存
                            const expiryTime = Date.now() + (tokenResponse.expires_in * 1000);
                            localStorage.setItem("google_access_token", accessToken);
                            localStorage.setItem("google_token_expiry", expiryTime.toString());

                    dotNetHelper.invokeMethodAsync("OnGoogleAuthSuccess", accessToken);
                        }
                    },
                    error_callback: (err) => {
                        console.error("Google Auth Error:", err);
                        dotNetHelper.invokeMethodAsync("OnGoogleAuthError", err.message || JSON.stringify(err));
                    }
                });
            }
            tokenClient.requestAccessToken({ prompt: 'consent' });
        };

        // 🟢 ログアウト処理
        window.logoutGoogle = function () {
            if (accessToken) {
                google.accounts.oauth2.revokeToken(accessToken, () => {
                    console.log("Googleトークンを破棄しました");
                });
            }
            accessToken = null;
            localStorage.removeItem("google_access_token");
            localStorage.removeItem("google_token_expiry");
        };

        // 📸 【復元】Quaggaのカメラ起動処理
        window.startQuagga = function (dotNetHelper) {
            const targetElement = document.querySelector('#interactive');
            if (!targetElement) {
                console.error("Camera target element '#interactive' not found.");
                return;
            }

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: targetElement,
                    constraints: {
                        width: 640,
                        height: 480,
                        facingMode: "environment" // 背面カメラを優先
                    },
                },
                decoder: {
                    readers: ["ean_reader"] // JAN/EANコード（日本の書籍バーコード）
                },
                locate: true
            }, function (err) {
                if (err) {
                    console.error("Quagga initialization failed:", err);
                    return;
                }
                console.log("Quagga initialization finished. Ready to start");
                Quagga.start();
            });

            // バーコードを検知したときのイベント（C#側へ通知）
            Quagga.onDetected(function (result) {
                if (result && result.codeResult && result.codeResult.code) {
                    const code = result.codeResult.code;
                    dotNetHelper.invokeMethodAsync('OnBarcodeDetected', code);
                }
            });
        };


        // ⚙️ スプレッドシート直接送信ロジック
        // 🟢 重複・連打防止フラグ（JavaScript側）
        let isSheetWriting = false;

        // ⚙️ 修正：通信が完了するまで次のリクエストを完全にブロックする
        window.sendToGoogleSheetsDirect = async function (dotNetHelper, accessTokenParam, spreadsheetId, dataJson) {
            // 🛑 すでに送信中なら、日時追加処理すらさせずに即座に終了する
            if (isSheetWriting) {
                console.log("現在Google Sheetsへ送信中のため、リクエストをブロックしました。");
                return;
            }

            try {
                // ロックをかける
                isSheetWriting = true;

                const dataObject = JSON.parse(dataJson);
                const timestamp = new Date().toLocaleString("ja-JP");
                
                // タイトル、著者、出版社、出版年、ISBN、追加日時の順番
                const rowValues = [[
                    dataObject.title || "",
                    dataObject.author || "",
                    dataObject.publisher || "",
                    dataObject.pubDate || "",
                    dataObject.isbn || "",
                    timestamp
                ]];

                const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/A1:append?valueInputOption=USER_ENTERED`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessTokenParam}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        values: rowValues
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Sheets API Error: ${response.status} - ${errorText}`);
                }

                // C#側に成功を通知
                dotNetHelper.invokeMethodAsync("OnSheetWriteSuccess");

            } catch (error) {
                console.error("Sheet write failed:", error);
                // C#側にエラーを通知
                dotNetHelper.invokeMethodAsync("OnSheetWriteError", error.message);
            } finally {
                // 🔓 成功・失敗に関わらず、すべての通信処理が「完全に終わった後」にロックを解除する
                isSheetWriting = false;
            }
        };
    </script>
</body>

</html>
