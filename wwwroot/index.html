<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarcodeAlertApp</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BarcodeAlertApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        // 音声オブジェクトを作成
        window.beepSound = new Audio('beep.mp3');

        window.startCamera = (dotNetHelper) => {
            window.beepSound.play()
                .then(() => console.log("Audio unlocked!"))
                .catch(err => console.log("Audio play blocked: ", err));

            const html5Qrcode = new Html5Qrcode("reader");
            html5Qrcode.start(
                { facingMode: "environment" }, 
                { 
                    fps: 10, 
                    // 🟢 ここを修正：真四角の「250」から「横長のサイズ指定」に変更
                    qrbox: (viewfinderWidth, viewfinderHeight) => {
                        return { width: 280, height: 80 };
                    }
                },
                (text) => {
                    window.beepSound.play();
                    dotNetHelper.invokeMethodAsync('OnScan', text);
                    html5Qrcode.stop();
                },
                (err) => { /* スキャン中のエラーは無視 */ }
            ).catch(err => {
                alert("カメラの起動に失敗しました: " + err);
            });
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
