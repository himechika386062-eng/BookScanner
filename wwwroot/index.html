<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarcodeAlertApp</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BarcodeAlertApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        // グローバルに音声ファイルを保持（wwwroot直下のbeep.mp3）
        window.beepSound = new Audio('beep.mp3');

        window.startCamera = (dotNetHelper) => {
            // 🟢 ユーザーがボタンを押した瞬間にAndroidのオーディオロックを解除
            window.beepSound.play().then(() => {
                window.beepSound.pause();
                window.beepSound.currentTime = 0;
                console.log("Audio unlocked!");
            }).catch(err => {
                console.log("Audio unlock failed: ", err);
            });

            const html5Qrcode = new Html5Qrcode("reader");
            html5Qrcode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                (text) => {
                    // 🟢 バーコード検知：ここで即座に音を鳴らす！
                    window.beepSound.play();

                    dotNetHelper.invokeMethodAsync('OnScan', text);
                    html5Qrcode.stop();
                },
                (err) => { /* スキャン中のエラーは無視 */ }
            ).catch(err => {
                alert("カメラの起動に失敗しました: " + err);
            });
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
